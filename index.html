<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Jet AI Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="history-bar" class="history-container"></div>

    <div class="main-layout">
        <div class="current-game">
            <div class="label">JORIY KOEFFITSIYENT</div>
            <div id="coefficient-number">0.00x</div>
            <div id="game-state">Kutilmoqda...</div>
        </div>

        <div class="analysis-panel">
            <div class="analysis-card">
                <div class="label">AI BASHORAT (ESTIMATED)</div>
                <div id="ai-prediction">--.--x</div>
            </div>
            <div class="analysis-card">
                <div class="label">G'ALABA EHTIMOLLIĞI</div>
                <div id="win-probability">0%</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
