<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Jet Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="history-wrapper" class="history-bar"></div>

        <div class="main-display">
            <div id="counter-wrapper" class="counter-box">
                <span id="coefficient-number">1.00x</span>
                <div id="status-label">READY</div>
            </div>

            <div class="side-panel">
                <div class="stat-card">
                    <span class="label">NEXT PREDICTION</span>
                    <div id="ai-value">--.--x</div>
                </div>
                <div class="stat-card">
                    <span class="label">PROBABILITY</span>
                    <div id="prob-value">0%</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
